name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Random delay
        shell: bash
        run: |
          set -euo pipefail
          delay=$(( RANDOM % 121 ))  # 0..2 minutes
          echo "Sleeping for ${delay}s..."
          sleep "${delay}"

      - name: Ping Render backend
        shell: bash
        run: |
          set -euo pipefail
          URL="https://tupulakaralshi.onrender.com/health"
          echo "Pinging ${URL}"
          curl -fsS --max-time 20 "${URL}" > /dev/null
          echo "OK"
